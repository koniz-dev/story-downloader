name: CodeQL

# Static analysis for JS/TS across the worker and frontend. Free for public
# repos. Findings appear in the repo's Security tab → Code scanning alerts.

on:
  # Direct pushes to main are the project's primary workflow, so we scan
  # there in addition to PRs to catch findings even when there's no PR.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 4 * * 1'  # Monday 04:37 UTC — off-peak, fixed minute
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # NOTE: tag-pinned for initial commit. Dependabot will SHA-pin on its
      # next github-actions run to match the existing pin style.
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
