name = "story-dl-worker"
main = "src/index.ts"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# Allowed origins for CORS — comma-separated, no spaces. Supports `*` glob
# patterns (see worker/src/cors.ts), but do NOT broaden to `*.github.io` —
# anyone can register a GitHub Pages subdomain, so that wildcard is an open
# door. Forks: replace `koniz-dev.github.io` with your own Pages origin (or
# your custom domain).
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://koniz-dev.github.io"

# Analytics Engine sink. The binding name (AE) must match `env.AE` in the
# Worker code and the schema documented at the top of src/analytics.ts.
# Schema is positional — append new blob/double fields at the end, never
# reorder existing ones, or SQL aggregations will silently shift columns.
[[analytics_engine_datasets]]
binding = "AE"
dataset = "story_dl_track"
