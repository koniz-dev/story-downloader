name = "story-dl-worker"
main = "src/index.ts"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# Allowed origins for CORS — comma-separated, no spaces. Supports `*` glob
# patterns (see worker/src/cors.ts). The `https://*.github.io` entry lets
# any fork's GitHub Pages origin work without editing this file; replace or
# extend with a custom domain if you serve the frontend from somewhere else.
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://*.github.io,https://koniz-dev.github.io"
