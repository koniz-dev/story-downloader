version: 2
updates:
  # Auto-PR new SHAs when GitHub Actions release new versions. Tag pinning
  # was deemed insufficient (re-tagging is a known supply-chain attack), so
  # the workflow files pin commit SHAs and rely on Dependabot to bump them.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    versioning-strategy: increase

  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    versioning-strategy: increase
