name: Dependency Review

# Gate PRs on dependency bumps that introduce known-vulnerable transitive
# packages. Free for public repos and runs against GitHub's advisory DB.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # NOTE: tag-pinned for initial commit. Dependabot will SHA-pin on its
      # next github-actions run to match the existing pin style.
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
